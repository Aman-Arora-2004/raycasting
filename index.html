<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Arora Raycaster</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }
        #canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        var canvas = document.getElementById('canvas');

        function resizeCanvas() {
            var w = window.innerWidth;
            var h = window.innerHeight;
            var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            if (isMobile) {
                var isLandscape = w > h;
                if (isLandscape) {
                    // phone landscape: fill width, leave room for browser bars
                    canvas.width  = w;
                    canvas.height = Math.floor(h * 0.95);
                } else {
                    // phone portrait: square-ish view
                    canvas.width  = Math.floor(w * 1);
                    canvas.height = h;
                }
            } else {
                // desktop: full window
                canvas.width  = w;
                canvas.height = h;
            }

            canvas.style.width  = canvas.width  + 'px';
            canvas.style.height = canvas.height + 'px';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        var Module = {
            canvas: canvas
        };
    </script>
    <script async type="text/javascript" src="index.js"></script>
</body>
</html>
