<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aman Arora Raycaster</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }
        #canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        var canvas = document.getElementById('canvas');
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        var w = window.innerWidth;
        var h = window.innerHeight;

        if (isMobile) {
            if (w > h) {
                // landscape
                canvas.width  = w;
                canvas.height = Math.floor(h * 1);
            } else {
                // portrait
                canvas.width  = Math.floor(w * 1);
                canvas.height = h;
            }
        } else {
            canvas.width  = w;
            canvas.height = h;
        }

        canvas.style.width  = canvas.width  + 'px';
        canvas.style.height = canvas.height + 'px';

        var Module = {
            canvas: canvas
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
